services:
  db:
    image: postgres:15-alpine
    container_name: arman-travel-db
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-arman_travel}
      - POSTGRES_USER=${POSTGRES_USER:-arman_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-arman_password_2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-arman_user} -d ${POSTGRES_DB:-arman_travel}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_URL_INSTAGRAM=${NEXT_PUBLIC_URL_INSTAGRAM:-https://www.instagram.com/armantravel.arg}
        - NEXT_PUBLIC_URL_WHATSAPP=${NEXT_PUBLIC_URL_WHATSAPP:-https://wa.me/5491156989263?text=Hola!%20Quiero%20mas%20info..}
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-}
        - DATABASE_URL=postgresql://${POSTGRES_USER:-arman_user}:${POSTGRES_PASSWORD:-arman_password_2024}@db:5432/${POSTGRES_DB:-arman_travel}
    container_name: arman-travel-web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-arman_user}:${POSTGRES_PASSWORD:-arman_password_2024}@db:5432/${POSTGRES_DB:-arman_travel}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME:-}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY:-}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET:-}
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-arman123}
      - JWT_SECRET=${JWT_SECRET:-arman-secret-key-super-secure-2024}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
